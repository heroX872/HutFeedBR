<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HutFeed</title>
    <style>
        /* Paleta de cores baseada no design enviado */
        :root {
            --bg-dark: #0b1a7d; 
            --bg-panel: #081460; 
            --accent: #0b1a7d;   
            --text: #ffffff;
            --input-bg: #16268e;
            --comment-bg: #050d42;
        }

        /* Responsividade e Base */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
        }

        #content { 
            padding: 10px; 
            padding-bottom: 90px; 
            max-width: 800px; 
            margin: 0 auto; 
        }

        /* Vídeo Intro */
        #intro-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; 
            justify-content: center; align-items: center; 
            transition: opacity 0.5s;
        }
        video { max-width: 100%; max-height: 100%; }

        /* Navegação Responsiva */
        nav { 
            position: fixed; bottom: 0; width: 100%; 
            display: flex; justify-content: space-around; 
            background: var(--bg-panel); padding: 15px 0; 
            border-top: 2px solid var(--accent); z-index: 100; 
        }
        nav button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; flex: 1; }
        
        /* Posts e UI */
        .post { 
            margin: 15px 0; padding: 15px; 
            background: var(--bg-panel); border-radius: 12px; 
            border-bottom: 2px solid var(--accent);
            word-wrap: break-word;
        }
        
        #novoPost { 
            position: fixed; bottom: 85px; right: 20px; 
            font-size: 24px; border-radius: 50%; width: 60px; height: 60px; 
            background: var(--accent); color: white; border: 2px solid #5a6aff; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 99; 
        }

        /* Modais Responsivos */
        #modal, #modal-perfil {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 300;
        }
        .box { 
            background: var(--bg-panel); padding: 20px; 
            margin: 10% auto; width: 90%; max-width: 450px; 
            border-radius: 15px; border: 1px solid var(--accent); 
        }

        /* Formulários */
        input, textarea, select { 
            width: 100%; margin: 10px 0; padding: 12px; 
            box-sizing: border-box; background: var(--input-bg); 
            color: #fff; border: 1px solid var(--accent); 
            border-radius: 8px; font-size: 16px; 
        }
        button { 
            padding: 12px; cursor: pointer; margin-top: 5px; 
            background: var(--accent); color: white; border: none; 
            border-radius: 8px; font-weight: bold; 
        }
        
        .comment-section { 
            margin-top: 10px; padding: 12px; 
            background: var(--comment-bg); border-radius: 8px; 
        }
        .chat-box { 
            height: 40vh; overflow-y: auto; background: var(--comment-bg); 
            padding: 10px; border-radius: 8px; margin-bottom: 10px; 
        }
        h1 { text-align: center; }
        h1 img { max-width: 180px; height: auto; }
        .user-card { 
            background: var(--input-bg); padding: 12px; margin: 8px 0; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 8px; 
        }
    </style>
</head>
<body>

<div id="intro-container">
    <video id="intro-video" autoplay muted playsinline>
        <source src="introdução.mp4" type="video/mp4">
    </video>
</div>

<div id="content"></div>

<nav>
    <button onclick="aba('feed')">📰</button>
    <button onclick="aba('chat')">💬</button>
    <button onclick="aba('search')">🔍</button>
    <button onclick="aba('profile')">👤</button>
</nav>

<button id="novoPost" onclick="document.getElementById('modal').style.display='block'">➕</button>

<div id="modal">
    <div class="box">
        <h3>Nova Publicação</h3>
        <input id="titulo-input" placeholder="Título (para Fórum)">
        <textarea id="texto-input" rows="4" placeholder="O que está acontecendo?"></textarea>
        <select id="tipo-select">
            <option value="feed">Post no Feed</option>
            <option value="blog">Meu Blog</option>
            <option value="forum">Criar Fórum</option>
        </select>
        <button onclick="postar()" style="width:100%">Publicar</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:#444; margin-top:10px">Cancelar</button>
    </div>
</div>

<div id="modal-perfil">
    <div class="box">
        <h3>Gerenciar Perfis</h3>
        <div id="lista-perfis"></div>
        <hr style="border: 0.5px solid var(--accent)">
        <input id="novo-nome-perfil" placeholder="Novo apelido">
        <button onclick="criarPerfil()" style="width:100%">Criar e Entrar</button>
        <button onclick="document.getElementById('modal-perfil').style.display='none'" style="width:100%; background:#444; margin-top:10px">Fechar</button>
    </div>
</div>

<script>
// --- BANCO DE DADOS E ESTADO ---
let user = localStorage.getItem("user") || "Anônimo";
let todosUsuarios = JSON.parse(localStorage.getItem("todosUsuarios")) || [user];
let db, chatAtivo;

let req = indexedDB.open("hutfeedDB", 6);
req.onupgradeneeded = e => {
    db = e.target.result;
    ["posts", "forums", "msgs", "comments"].forEach(s => {
        if(!db.objectStoreNames.contains(s)) db.createObjectStore(s, {autoIncrement:true});
    });
};
req.onsuccess = e => { db = e.target.result; aba('feed'); };

function salvar(store, data) { return db.transaction(store, "readwrite").objectStore(store).add(data); }

// --- NAVEGAÇÃO ---
function header() { return `<h1><img src="logo.png" alt="HutFeed" onerror="this.style.display='none'; this.parentNode.innerText='HutFeed'"></h1>`; }

function aba(nome) {
    if(window.chatInterval) clearInterval(window.chatInterval);
    const content = document.getElementById("content");
    content.innerHTML = header();
    
    if(nome === 'feed') carregarFeed();
    if(nome === 'chat') carregarForuns();
    if(nome === 'profile') carregarPerfil();
    if(nome === 'search') carregarBuscaUI();
}

// --- FÓRUM / CHAT ---
function carregarForuns() {
    const content = document.getElementById("content");
    content.innerHTML += "<h2>Fóruns 💬</h2>";
    db.transaction("forums", "readonly").objectStore("forums").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c) {
            content.innerHTML += `<div class="post" onclick="abrirChat(${c.key})" style="cursor:pointer"><b># ${c.value.nome}</b><br><small>Por ${c.value.user}</small></div>`;
            c.continue();
        }
    };
}

function abrirChat(id) {
    chatAtivo = id;
    const content = document.getElementById("content");
    content.innerHTML = header() + `<button onclick="aba('chat')">⬅ Voltar</button><div id="box-msgs" class="chat-box"></div>
        <div style="display:flex; gap:5px"><input id="input-msg" placeholder="Mensagem..."><button onclick="enviarMsg()">📩</button></div>`;
    carregarMsgs();
    window.chatInterval = setInterval(carregarMsgs, 2000);
}

function carregarMsgs() {
    const box = document.getElementById("box-msgs");
    if(!box) return;
    box.innerHTML = "";
    db.transaction("msgs", "readonly").objectStore("msgs").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c) {
            if(c.value.forumId === chatAtivo) box.innerHTML += `<p><b>${c.value.user}:</b> ${c.value.texto}</p>`;
            c.continue();
        } else { box.scrollTop = box.scrollHeight; }
    };
}

function enviarMsg() {
    let inp = document.getElementById("input-msg");
    if(!inp.value) return;
    salvar("msgs", {texto: inp.value, user: user, forumId: chatAtivo});
    inp.value = ""; carregarMsgs();
}

// --- BUSCA ---
function carregarBuscaUI() {
    const content = document.getElementById("content");
    content.innerHTML += `<h2>Busca 🔍</h2><input id="input-busca" placeholder="O que procura?"><button onclick="executarBusca()" style="width:100%">Buscar nos Posts</button><div id="res-busca"></div>`;
}

function executarBusca() {
    let termo = document.getElementById("input-busca").value.toLowerCase();
    let res = document.getElementById("res-busca");
    res.innerHTML = "";
    db.transaction("posts", "readonly").objectStore("posts").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c) {
            if(c.value.texto.toLowerCase().includes(termo)) res.innerHTML += `<div class="post"><b>@${c.value.user}</b><p>${c.value.texto}</p></div>`;
            c.continue();
        }
    };
}

// --- FEED E COMENTÁRIOS ---
function carregarFeed() {
    const content = document.getElementById("content");
    content.innerHTML += "<h2>Feed 📰</h2>";
    db.transaction("posts", "readonly").objectStore("posts").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c) {
            if(c.value.tipo === "feed") {
                content.innerHTML += `
                    <div class="post">
                        <b>@${c.value.user}</b><p>${c.value.texto}</p>
                        <button onclick="curtir(${c.key})">👍 ${c.value.likes || 0}</button>
                        <button onclick="toggleComentarios(${c.key})">💬</button>
                        <div id="comentarios-${c.key}" class="comment-section" style="display:none;"></div>
                    </div>`;
            }
            c.continue();
        }
    };
}

function toggleComentarios(id) {
    let div = document.getElementById("comentarios-" + id);
    if(div.style.display === "none") {
        div.style.display = "block";
        div.innerHTML = `<input id="c-${id}" placeholder="Comentar..."><button onclick="comentar(${id})">Enviar</button><div id="lista-${id}"></div>`;
        listarComentarios(id);
    } else { div.style.display = "none"; }
}

function listarComentarios(id) {
    const lista = document.getElementById("lista-" + id);
    lista.innerHTML = "";
    db.transaction("comments", "readonly").objectStore("comments").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c && c.value.postId === id) {
            lista.innerHTML += `<p style="border-bottom:1px solid #ffffff22; padding:5px"><b>${c.value.user}:</b> ${c.value.texto}</p>`;
            c.continue();
        }
    };
}

function comentar(id) {
    let texto = document.getElementById("c-" + id).value;
    if(!texto) return;
    db.transaction("comments", "readwrite").objectStore("comments").add({texto, user, postId: id});
    listarComentarios(id); document.getElementById("c-" + id).value = "";
}

// --- PERFIL E BLOG ---
function carregarPerfil() {
    document.getElementById("content").innerHTML += `<h2>Perfil 👤</h2>
        <div class="post" style="text-align:center"><h3>${user}</h3>
            <button onclick="verBlog()" style="width:100%">📖 Ver Meu Blog</button><br><br>
            <button onclick="abrirModalPerfil()" style="width:100%">🔄 Mudar/Criar Perfil</button>
        </div>`;
}

function verBlog() {
    const content = document.getElementById("content");
    content.innerHTML = header() + `<button onclick="aba('profile')">⬅ Voltar</button><h2>Meu Blog 📖</h2>`;
    db.transaction("posts", "readonly").objectStore("posts").openCursor().onsuccess = e => {
        let c = e.target.result;
        if(c) {
            if(c.value.tipo === "blog" && c.value.user === user) content.innerHTML += `<div class="post">${c.value.texto}</div>`;
            c.continue();
        }
    };
}

function abrirModalPerfil() {
    document.getElementById("modal-perfil").style.display = "block";
    const lista = document.getElementById("lista-perfis"); lista.innerHTML = "";
    todosUsuarios.forEach(u => { lista.innerHTML += `<div class="user-card">${u} <button onclick="mudarPerfil('${u}')">Entrar</button></div>`; });
}

function mudarPerfil(nome) { localStorage.setItem("user", nome); location.reload(); }
function criarPerfil() {
    let nome = document.getElementById("novo-nome-perfil").value;
    if(!nome || todosUsuarios.includes(nome)) return alert("Nome inválido ou já existe!");
    todosUsuarios.push(nome); localStorage.setItem("todosUsuarios", JSON.stringify(todosUsuarios)); mudarPerfil(nome);
}

// --- POSTAR E VÍDEO ---
function postar() {
    let t = document.getElementById("tipo-select").value, txt = document.getElementById("texto-input").value, tit = document.getElementById("titulo-input").value;
    if(t === "forum") {
        if(!tit) return alert("Nome do fórum!");
        salvar("forums", {nome: tit, user: user}); aba('chat');
    } else {
        if(!txt) return alert("Escreva algo!");
        salvar("posts", {texto: txt, tipo: t, user: user, likes: 0}); aba('feed');
    }
    document.getElementById('modal').style.display = 'none';
}

function curtir(id) {
    let store = db.transaction("posts", "readwrite").objectStore("posts");
    store.get(id).onsuccess = e => {
        let p = e.target.result; p.likes = (p.likes || 0) + 1; store.put(p, id); aba('feed');
    };
}

const video = document.getElementById('intro-video');
video.onended = () => { 
    const container = document.getElementById('intro-container');
    container.style.opacity = "0"; 
    setTimeout(() => container.style.display = 'none', 500); 
};
</script>
</body>
</html>
